name: CI

# CPU-only tests: the linear-Gaussian surrogate theory (src/rwl, checked against its
# closed forms) and E2's cluster-aware inference (experiments/audio/e2_stats, checked on
# synthetic points). No GPU / neural models are needed here — those runs happen on the
# host via run_audio_all.py. This workflow is the public, always-visible pass that
# replaces any "27/27 in the commit message" claim.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (CPU theory + inference deps only)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install "scikit-learn>=1.3"
      - name: Run CPU test suite
        env:
          PYTHONHASHSEED: "0"
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pytest tests experiments/audio/tests -q
