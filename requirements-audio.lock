# Exact audio-pipeline environment used for the paper runs (server: RTX 4090,
# Python 3.12, CUDA 12.8). Install torch/torchaudio from the cu128 index first,
# then `pip install --no-deps descript-audio-codec descript-audiotools` (they pin
# an old torch), then the rest.
#
# Models (name -> source). EXACT commit SHAs + checkpoint SHA-256 hashes are pinned in
# models.lock.json (generated on the run host by scripts/capture_model_lock.py; HF
# from_pretrained passes revision= from it, and experiments verify every checkpoint
# hash at startup via experiments.audio.model_lock.verify_all):
#   Vocos mel        charactr/vocos-mel-24khz        (HF, revision pinned)
#   Vocos-EnCodec    charactr/vocos-encodec-24khz    (HF, revision pinned)
#   EnCodec 24k      encodec_24khz                   (encodec pip package weights, v0.1.1)
#   DAC 16k          descript/dac_16khz              (github release via dac.utils.download; checksum in lock)
#   SNAC 24k         hubertsiuzdak/snac_24khz        (HF, revision pinned)
#   AudioSeal        audioseal_wm_16bits / audioseal_detector_16bits (audioseal 0.2.0; ckpt hash in lock)
#   WavMark          default checkpoint (HF: M4869/WavMark; revision + hash in lock)
#   SilentCipher     44.1 kHz model (44_1_khz/73999_iteration; HF Sony/SilentCipher snapshot;
#                    the released 16 kHz model is unreachable through the package byte API — see docs)
#   kNN-VC           bshall/knn-vc torch.hub (commit in lock) + prematched HiFi-GAN + WavLM-Large ckpts (hashed)
#   Data             LibriSpeech dev-clean + test-clean (openslr.elda.org mirror)

