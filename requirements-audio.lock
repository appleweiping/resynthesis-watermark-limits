# Exact audio-pipeline environment used for the paper runs (server: RTX 4090,
# Python 3.12, CUDA 12.8). Install torch/torchaudio from the cu128 index first,
# then `pip install --no-deps descript-audio-codec descript-audiotools` (they pin
# an old torch), then the rest.
#
# Models (name -> revision/source):
#   Vocos mel        charactr/vocos-mel-24khz        (HF)
#   Vocos-EnCodec    charactr/vocos-encodec-24khz    (HF)
#   EnCodec 24k      encodec_24khz                   (encodec pip package weights)
#   DAC 16k          descript/dac_16khz              (github release via dac.utils.download)
#   SNAC 24k         hubertsiuzdak/snac_24khz        (HF)
#   AudioSeal        audioseal_wm_16bits / audioseal_detector_16bits
#   WavMark          default checkpoint (HF: M4869/WavMark)
#   SilentCipher     16k model (github release via silentcipher.get_model)
#   kNN-VC           bshall/knn-vc torch.hub, prematched HiFi-GAN + WavLM-Large
#   Data             LibriSpeech dev-clean + test-clean (openslr.elda.org mirror)

